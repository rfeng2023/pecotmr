context:
  version: VERSION_PLACEHOLDER

package:
  name: r-pecotmr
  version: ${{ version }}

source:
  path: pecotmr-${{ version }}.tar.gz
  sha256: SHA256SUM_PLACEHOLDER

build:
  number: BUILD_PLACEHOLDER
  dynamic_linking:
    rpaths:
      - lib/R/lib/
      - lib/
  script: R CMD INSTALL --build .

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('cxx') }}
  host:
    - bioconductor-iranges
    - bioconductor-qvalue
    - bioconductor-s4vectors
    - bioconductor-snpstats
    - r-base
    - r-bigsnpr
    - r-bigstatsr
    - r-coda
    - r-coloc
    - r-colocboost
    - r-dofuture
    - r-dplyr
    - r-flashier
    - r-fsusier
    - r-furrr
    - r-future
    - r-gbj
    - r-glmnet
    - r-harmonicmeanp
    - r-knitr
    - r-magrittr
    - r-mashr
    - r-matrixstats
    - r-mr.mash.alpha
    - r-mvsusier
    - r-pgenlibr
    - r-purrr
    - r-qgg
    - r-quadprog
    - r-quantreg
    - r-rcpp
    - r-rcpparmadillo
    - r-readr
    - r-rfast
    - r-rlang
    - r-rmarkdown
    - r-stringr
    - r-susier
    - r-testthat
    - r-tibble
    - r-tidyr
    # r-udr is a Suggests-only dep, not installed in CI
    - r-vctrs
    - r-vroom
    - r-xicor
  run:
    - bioconductor-iranges
    - bioconductor-qvalue
    - bioconductor-s4vectors
    - bioconductor-snpstats
    - r-base
    - r-bigsnpr
    - r-bigstatsr
    - r-coda
    - r-coloc
    - r-colocboost
    - r-dofuture
    - r-dplyr
    - r-flashier
    - r-fsusier
    - r-furrr
    - r-future
    - r-gbj
    - r-glmnet
    - r-harmonicmeanp
    - r-knitr
    - r-magrittr
    - r-mashr
    - r-matrixstats
    - r-mr.mash.alpha
    - r-mvsusier
    - r-pgenlibr
    - r-purrr
    - r-qgg
    - r-quadprog
    - r-quantreg
    - r-rcpp
    - r-rcpparmadillo
    - r-readr
    - r-rfast
    - r-rlang
    - r-rmarkdown
    - r-stringr
    - r-susier
    - r-testthat
    - r-tibble
    - r-tidyr
    # r-udr is a Suggests-only dep, not installed in CI
    - r-vctrs
    - r-vroom
    - r-xicor

tests:
  - script:
      - R -e "library('pecotmr')"

about:
  license: MIT
  license_file: LICENSE
  summary: pecotmr implements pair-wise enrichment, colocalization, TWAS and Mendelian Randomization to integrate QTL and GWAS analysis based on a fine-mapped single effects model.
  homepage: https://github.com/StatFunGen/pecotmr

extra:
  recipe-maintainers:
    - danielnachun
