name: Continuous Integration

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - .gitignore
      - README.md

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci_linux-64:
    name: linux-64 CI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        environment: ["r43", "r44"]

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v6

      - name: Create TOML from recipe
        run: |
          .github/workflows/create_toml_from_yaml.sh ${GITHUB_WORKSPACE}
          mkdir /tmp/pixi
          mv ${GITHUB_WORKSPACE}/pixi.toml /tmp/pixi

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          manifest-path: /tmp/pixi/pixi.toml
          cache: true

      - name: Run unit tests
        run: pixi run --environment ${{ matrix.environment }} --manifest-path /tmp/pixi/pixi.toml devtools_test

      - name: Check unit test code coverage
        if: ${{ matrix.environment == 'r44' }}
        run: pixi run --environment ${{ matrix.environment }} --manifest-path /tmp/pixi/pixi.toml codecov

  ci_osx-arm64:
    name: osx-arm64 CI
    runs-on: macos-14
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        environment: ["r43", "r44"]

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v6

      - name: Create TOML from recipe
        run: |
          .github/workflows/create_toml_from_yaml.sh ${GITHUB_WORKSPACE}
          mkdir /tmp/pixi
          mv ${GITHUB_WORKSPACE}/pixi.toml /tmp/pixi

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          manifest-path: /tmp/pixi/pixi.toml
          cache: true

      - name: Run unit tests
        run: pixi run --environment ${{ matrix.environment }} --manifest-path /tmp/pixi/pixi.toml devtools_test
